<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mon Espace - Utilisateur</title>
    <style>

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #fdf5e6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }


        .user-card {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(161, 136, 127, 0.2);
            text-align: center;
            width: 380px;
            border-left: 8px solid #a1887f;
        }

        h2 {
            color: #6d4c41;
            margin-bottom: 10px;
            font-size: 26px;
        }

        p {
            color: #8d6e63;
            margin-bottom: 30px;
            font-size: 15px;
            line-height: 1.5;
        }


        .role-label {
            display: inline-block;
            background-color: #efebe9;
            color: #8d6e63;
            padding: 4px 12px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 11px;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }


        .btn-logout {
            background-color: white;
            color: #6d4c41;
            border: 2px solid #6d4c41;
            padding: 10px 30px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-logout:hover {
            background-color: #6d4c41;
            color: white;
            box-shadow: 0 4px 10px rgba(109, 76, 65, 0.3);
        }

        .btn-logout:active {
            transform: scale(0.96);
        }
    </style>
</head>
<body>

<div class="user-card">
    <div class="role-label">ESPACE PERSONNEL</div>
    <h2>Bienvenue Utilisateur !</h2>
    <p>Heureux de vous revoir. Profitez de votre espace membre sécurisé.</p>

    <form th:action="@{/logout}" method="post">
        <button type="submit" class="btn-logout">Déconnexion</button>
    </form>
</div>

</body>
</html>
